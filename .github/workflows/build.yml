name: Build Jian AI

on: [push, workflow_dispatch]

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Build Desktop
      run: |
        cd jian-clients/desktop
        npm install
        npm run build
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: jian-${{ matrix.os }}
        path: jian-clients/desktop/dist

  build-mobile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build Android
      run: |
        cd jian-clients/mobile
        npm install
        cd android && ./gradlew assembleRelease
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: jian-android
        path: jian-clients/mobile/android/app/build/outputs/apk/release/*.apk