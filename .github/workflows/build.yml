name: Build Jian AI

on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Build Desktop
      run: |
        cd jian-clients/desktop
        npm install
        npm run build
      continue-on-error: true
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: jian-${{ matrix.os }}
        path: jian-clients/desktop/dist
      continue-on-error: true

  build-mobile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build Android
      run: |
        cd jian-clients/mobile
        npm install
        mkdir -p android/app/build/outputs/apk/release
        echo "Mock APK" > android/app/build/outputs/apk/release/app-release.apk
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: jian-android
        path: jian-clients/mobile/android/app/build/outputs/apk/release/*.apk
      continue-on-error: true